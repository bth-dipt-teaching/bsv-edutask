name: Python Backend Tests

on:
  push:
    branches: [ master, assignment6-ci]
  pull_request:
    branches: [master, assignment6-ci]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          cd backend
          pip install -r requirements.pip

      - name: Run tests
        run: |
          cd backend
          python -m pytest

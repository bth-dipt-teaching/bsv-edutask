name: Backend Unit Tests

on:
  push:
    branches:
      - "**"            # Kör tester på alla branches
  pull_request:
    branches:
      - master          # Kör tester på alla PR:er mot master

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:6
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'" 
          --health-interval=10s 
          --health-timeout=5s 
          --health-retries=5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Wait for MongoDB (extra säkerhet)
        run: |
          for i in {1..30}; do
            nc -z localhost 27017 && echo "✅ MongoDB is up!" && break
            echo "⏳ Waiting for MongoDB..."
            sleep 2
          done

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.pip
          pip install pytest

      - name: Prepare validators directory (fix för todo.json)
        run: |
          mkdir -p src/static/validators
          cp backend/src/static/validators/* src/static/validators/

      - name: Run all backend tests
        run: |
          pytest -v backend/test

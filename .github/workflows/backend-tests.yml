name: Backend Unit Tests

on:
  push:
    branches:
      - "**"            # Körs på push till alla branches
  pull_request:
    branches:
      - master          # Körs för alla PR:er som går mot master

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:6
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongo --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.pip
          pip install pytest

      - name: Run tests
        run: |
          pytest backend/test

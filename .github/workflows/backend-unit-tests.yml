name: Backend Unit Tests

on:
  push:
    branches:
      - main
      - fix-backend-unit-tests-ci
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  backend-unit-tests:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.pip

      - name: Run backend unit tests
        run: |
          python -m pytest test/demo \
            --ignore=test/demo/test_dao_create_integration.py \
            -m "not demo and not namespaces" \
            -q